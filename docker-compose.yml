# Полный стек: Java-шлюз (порт 8080) перед Python-сервисом распознавания (порт 8000).
#
#   docker compose up --build
#   открыть http://localhost:8080
#
# Браузер ходит только в шлюз; шлюз отдаёт фронтенд и проксирует /api/** в detector.

services:
  detector:
    build:
      context: .
      dockerfile: Dockerfile.python
    env_file:
      - .env
    volumes:
      - ./db:/srv/db
      - ./data:/srv/data
      - ./model_data:/srv/model_data
    expose:
      - "8000"
    restart: unless-stopped

  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    environment:
      GATEWAY_PYTHON_SERVICE_URL: http://detector:8000
      GATEWAY_TIMEOUT_MS: "60000"
    ports:
      - "8080:8080"
    depends_on:
      - detector
    restart: unless-stopped
